<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pomodoro Timer - Stacked</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0b0b;
      color: white;
      padding: 48px 20px 80px;
      text-align: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      font-size: 2em;
      font-weight: 800;
      background: linear-gradient(to right, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 6px;
    }

    .subtitle {
      color: #555;
      font-size: 0.88rem;
      margin-bottom: 48px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Ring ── */
    .ring-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 32px;
    }

    .ring-wrap svg {
      transform: rotate(-90deg);
      display: block;
    }

    .ring-track {
      fill: none;
      stroke: #1a1a1a;
      stroke-width: 10;
    }

    .ring-progress {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      stroke: url(#focusGrad);
      transition: stroke-dashoffset 0.9s linear, stroke 0.5s ease;
    }

    .ring-progress.break-ring {
      stroke: #4ade80;
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .timer-display {
      font-size: 3.4em;
      font-weight: 700;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .mode-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #777;
      transition: color 0.4s;
    }
    .mode-label.break-mode { color: #4ade80; }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .btn-start {
      background: linear-gradient(to right, #a855f7, #3b82f6);
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      min-width: 120px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-start:hover { opacity: 0.85; }
    .btn-start:active { transform: scale(0.97); }

    .btn-reset {
      background: transparent;
      color: #555;
      border: 1px solid #2a2a2a;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-reset:hover { border-color: #444; color: #888; }

    /* ── Session dots ── */
    .session-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #222;
      border: 1px solid #333;
      transition: background 0.3s;
    }
    .dot.done { background: #a855f7; border-color: #a855f7; }

    /* ── Note ── */
    .note {
      font-size: 0.82rem;
      color: #444;
      max-width: 320px;
      margin: 0 auto 52px;
      line-height: 1.7;
    }

    /* ── App CTA ── */
    .app-cta {
      background: #111;
      border: 1px solid #1e1e2e;
      border-radius: 18px;
      padding: 28px 24px;
      max-width: 460px;
      margin: 0 auto;
    }
    .app-cta p {
      margin: 0 0 16px;
      font-size: 1rem;
      color: #999;
      line-height: 1.5;
    }
    .app-cta strong {
      background: linear-gradient(to right, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }
    .app-cta a {
      display: inline-block;
      background: linear-gradient(to right, #a855f7, #3b82f6);
      color: white;
      padding: 12px 26px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    .app-cta a:hover { opacity: 0.85; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1e1e2e;
      border: 1px solid #3a3a5a;
      color: white;
      padding: 14px 26px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ── */
    footer {
      margin-top: 48px;
      font-size: 0.78em;
      color: #333;
    }
    footer a { color: #444; text-decoration: none; margin: 0 8px; }
    footer a:hover { color: #777; }
  </style>
</head>
<body>

  <h1>Pomodoro Timer</h1>
  <p class="subtitle">25 min focus &nbsp;·&nbsp; 5 min break &nbsp;·&nbsp; repeat</p>

  <!-- Circular ring -->
  <div class="ring-wrap">
    <svg id="ringsvg" width="220" height="220" viewBox="0 0 220 220">
      <defs>
        <linearGradient id="focusGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#3b82f6"/>
        </linearGradient>
      </defs>
      <circle class="ring-track" cx="110" cy="110" r="98"/>
      <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="98"/>
    </svg>
    <div class="ring-center">
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="mode-label" id="modeLabel">Focus</div>
    </div>
  </div>

  <!-- Session dots (4 pomodoros) -->
  <div class="session-dots">
    <div class="dot" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
  </div>

  <div class="controls">
    <button class="btn-start" id="startBtn" onclick="toggleTimer()">Start</button>
    <button class="btn-reset" onclick="resetTimer()">Reset</button>
  </div>

  <p class="note">Consistent focus sessions beat marathon study crams. Take your breaks — your brain needs them.</p>

  <!-- App CTA -->
  <div class="app-cta">
    <p>Studying? Use <strong>Stacked</strong> to turn your notes into AI flashcards.</p>
    <a href="https://apps.apple.com/app/id6744585549" target="_blank" rel="noopener">Get Stacked Free →</a>
  </div>

  <footer>
    <a href="/">← Stacked</a>
    <a href="/import.html">Import Tool</a>
    <a href="/privacy.html">Privacy</a>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    const FOCUS_SECS = 25 * 60;
    const BREAK_SECS = 5 * 60;
    const CIRCUMFERENCE = 2 * Math.PI * 98; // r=98

    let secondsLeft = FOCUS_SECS;
    let totalSecs = FOCUS_SECS;
    let interval = null;
    let onBreak = false;
    let running = false;
    let completedPomodoros = 0;

    const ring = document.getElementById('ringProgress');
    ring.style.strokeDasharray = CIRCUMFERENCE;

    function updateDisplay() {
      const mins = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
      const secs = String(secondsLeft % 60).padStart(2, '0');
      document.getElementById('timerDisplay').textContent = `${mins}:${secs}`;
      document.title = `${mins}:${secs} — ${onBreak ? 'Break' : 'Focus'} · Stacked`;

      const label = document.getElementById('modeLabel');
      label.textContent = onBreak ? 'Break' : 'Focus';
      label.className = 'mode-label' + (onBreak ? ' break-mode' : '');

      // Ring progress
      const progress = secondsLeft / totalSecs;
      const offset = CIRCUMFERENCE * (1 - progress);
      ring.style.strokeDashoffset = offset;
      ring.className = 'ring-progress' + (onBreak ? ' break-ring' : '');

      // Session dots
      for (let i = 0; i < 4; i++) {
        document.getElementById(`dot${i}`).className = 'dot' + (i < completedPomodoros % 4 ? ' done' : '');
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    function toggleTimer() {
      if (running) {
        clearInterval(interval);
        interval = null;
        running = false;
        document.getElementById('startBtn').textContent = 'Resume';
      } else {
        running = true;
        document.getElementById('startBtn').textContent = 'Pause';
        interval = setInterval(() => {
          secondsLeft--;
          updateDisplay();

          if (secondsLeft <= 0) {
            clearInterval(interval);
            interval = null;
            running = false;

            if (!onBreak) {
              completedPomodoros++;
              showToast('🎉 Focus session done! Take a break.');
            } else {
              showToast('⏰ Break over — back to it!');
            }

            onBreak = !onBreak;
            totalSecs = onBreak ? BREAK_SECS : FOCUS_SECS;
            secondsLeft = totalSecs;
            document.getElementById('startBtn').textContent = 'Start';
            updateDisplay();
          }
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(interval);
      interval = null;
      running = false;
      onBreak = false;
      totalSecs = FOCUS_SECS;
      secondsLeft = FOCUS_SECS;
      document.getElementById('startBtn').textContent = 'Start';
      updateDisplay();
    }

    updateDisplay();
  </script>
</body>
</html>
