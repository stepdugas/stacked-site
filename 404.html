<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Stacked Flashcards</title>
  <meta name="robots" content="noindex" />

  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script>
    // If this is the /import route, redirect to import-redirect.html with the query string
    (function() {
      var path = window.location.pathname;
      if (path === '/import' || path === '/import/') {
        window.location.replace('/import-redirect.html' + window.location.search);
        return;
      }
    })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #a855f7;
      --blue: #3b82f6;
      --bg-primary: #09090b;
      --bg-card: #16161a;
      --border: #1e1e24;
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --gradient: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6);
      --radius-sm: 10px;
    }
    body {
      background: var(--bg-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-primary);
      text-align: center;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    a {
      background: var(--gradient);
      color: white;
      padding: 14px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: opacity 0.2s, transform 0.2s;
    }
    a:hover { opacity: 0.9; transform: translateY(-2px); }
  </style>
</head>
<body>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist. Head back to Stacked and keep studying.</p>
  <a href="/">Back to Home</a>
</body>
</html>
