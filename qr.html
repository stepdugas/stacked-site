<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Code Generator - Stacked</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0b0b;
      color: white;
      padding: 24px 20px 60px;
      max-width: 600px;
      margin: auto;
      text-align: center;
    }

    h1 {
      font-size: 2.2em;
      font-weight: 800;
      background: linear-gradient(to right, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .tip {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.9rem;
      color: #aaa;
      margin: 20px auto 32px;
      max-width: 520px;
      text-align: left;
    }
    .tip a {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 600;
    }
    .tip a:hover { text-decoration: underline; }

    label {
      display: block;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #a855f7; }

    button {
      margin-top: 14px;
      width: 100%;
      background: linear-gradient(to right, #a855f7, #3b82f6);
      color: white;
      border: none;
      padding: 13px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }

    #qrcode {
      margin-top: 28px;
      display: flex;
      justify-content: center;
    }
    #qrcode canvas { border-radius: 10px; }

    #error-msg {
      color: #f87171;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
    }

    footer {
      margin-top: 48px;
      font-size: 0.8em;
      color: #444;
    }
    footer a { color: #555; text-decoration: none; margin: 0 8px; }
    footer a:hover { color: #888; }
  </style>
</head>
<body>

  <h1>QR Code Generator</h1>

  <div class="tip">
    💡 <strong>Pro tip:</strong> Use the <a href="/import.html">Import Tool</a> to build your flashcard deck and get a link + QR code in one step. Or paste an existing import link below.
  </div>

  <label for="stackLink">Stack Import Link</label>
  <input type="text" id="stackLink" placeholder="https://stackedflashcards.com/import?stack=..." />
  <button onclick="generateQR()">Generate QR Code</button>

  <p id="error-msg">Please enter a valid Stacked import link.</p>

  <div id="qrcode"></div>

  <footer>
    <a href="/">← Back to Stacked</a>
    <a href="/import.html">Import Tool</a>
    <a href="/privacy.html">Privacy Policy</a>
  </footer>

  <script>
    function generateQR() {
      const link = document.getElementById('stackLink').value.trim();
      const errorEl = document.getElementById('error-msg');
      const qrcodeEl = document.getElementById('qrcode');

      qrcodeEl.innerHTML = '';
      errorEl.style.display = 'none';

      if (!link.startsWith('https://stackedflashcards.com/import?stack=')) {
        errorEl.style.display = 'block';
        return;
      }

      QRCode.toCanvas(link, { width: 220, margin: 2, color: { dark: '#000', light: '#fff' } }, (err, canvas) => {
        if (err) {
          errorEl.textContent = 'Something went wrong generating the QR code.';
          errorEl.style.display = 'block';
        } else {
          qrcodeEl.appendChild(canvas);
        }
      });
    }
  </script>
</body>
</html>
