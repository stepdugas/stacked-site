<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Import Flashcards - Stacked</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0b0b;
      color: white;
      padding: 24px 20px 60px;
      max-width: 680px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 2.2em;
      background: linear-gradient(to right, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 32px;
      font-size: 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      margin-top: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #a855f7; }

    textarea {
      width: 100%;
      height: 200px;
      margin-top: 0;
      font-size: 0.95rem;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      resize: vertical;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #a855f7; }
    textarea::placeholder { color: #555; }

    /* Color picker */
    .color-swatches {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }
    .swatch:hover { transform: scale(1.12); }
    .swatch.selected { border-color: white; }

    /* Generate button */
    button.primary {
      margin-top: 24px;
      width: 100%;
      background: linear-gradient(to right, #a855f7, #3b82f6);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button.primary:hover { opacity: 0.88; }

    /* Output */
    #output {
      margin-top: 32px;
      display: none;
    }

    .result-section {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .result-section h3 {
      margin: 0 0 12px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
    }

    .link-box {
      background: #0f0f0f;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.8rem;
      color: #60a5fa;
      word-break: break-all;
      margin-bottom: 10px;
    }

    .copy-btn {
      background: #222;
      color: #ccc;
      border: 1px solid #333;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #2e2e2e; }
    .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

    .open-btn {
      display: inline-block;
      margin-top: 10px;
      background: linear-gradient(to right, #a855f7, #3b82f6);
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }
    #qrcode canvas {
      border-radius: 10px;
    }

    .note {
      font-size: 0.85rem;
      color: #555;
      margin-top: 8px;
    }

    footer {
      text-align: center;
      padding-top: 40px;
      font-size: 0.8em;
      color: #444;
    }
    footer a { color: #555; }
  </style>
</head>
<body>

  <h1>Import Flashcards</h1>
  <p class="subtitle">Build a stack on the web, open it instantly in the app.</p>

  <label for="stackName">Stack Name</label>
  <input type="text" id="stackName" placeholder="e.g. Biology Chapter 5" maxlength="60" />

  <label>Stack Color</label>
  <div class="color-swatches" id="swatches"></div>

  <label for="input">Flashcards <span style="color:#555;font-weight:400;text-transform:none;">(one per line — Question | Answer)</span></label>
  <textarea id="input" placeholder="What is the capital of France? | Paris&#10;What year did WWII end? | 1945&#10;Mitochondria function | Produces ATP / energy for the cell"></textarea>

  <button class="primary" onclick="generateLink()">✨ Generate Import Link &amp; QR Code</button>

  <div id="output">
    <div class="result-section">
      <h3>Import Link</h3>
      <div class="link-box" id="linkDisplay"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy Link</button>
      &nbsp;
      <a id="openLink" class="open-btn" href="#">Open in App →</a>
      <p class="note">Tap "Open in App" on your iPhone, or copy the link and paste it in Safari.</p>
    </div>

    <div class="result-section">
      <h3>QR Code</h3>
      <div id="qrcode"></div>
      <p class="note" style="text-align:center;">Scan with your iPhone camera to import directly.</p>
    </div>
  </div>

  <footer>
    <a href="/">← Back to Stacked</a> &nbsp;·&nbsp;
    <a href="/privacy.html">Privacy Policy</a>
  </footer>

  <script>
    // iOS-accurate RGB values for each color (matches CodableColor in app)
    const COLORS = [
      { name: 'Blue',   hex: '#007AFF', r: 0.0,   g: 0.478, b: 1.0   },
      { name: 'Purple', hex: '#AF52DE', r: 0.686, g: 0.322, b: 0.969 },
      { name: 'Green',  hex: '#30D158', r: 0.188, g: 0.820, b: 0.345 },
      { name: 'Orange', hex: '#FF9F0A', r: 1.0,   g: 0.624, b: 0.039 },
      { name: 'Pink',   hex: '#FF375F', r: 1.0,   g: 0.216, b: 0.373 },
      { name: 'Teal',   hex: '#5AC8FA', r: 0.353, g: 0.784, b: 0.980 },
    ];

    let selectedColor = COLORS[0];
    let generatedLink = '';

    // Build color swatches
    const swatchContainer = document.getElementById('swatches');
    COLORS.forEach((c, i) => {
      const div = document.createElement('div');
      div.className = 'swatch' + (i === 0 ? ' selected' : '');
      div.style.background = c.hex;
      div.title = c.name;
      div.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
        div.classList.add('selected');
        selectedColor = c;
      });
      swatchContainer.appendChild(div);
    });

    function generateLink() {
      const rawTitle = document.getElementById('stackName').value.trim();
      const title = rawTitle || 'Imported Stack';
      const input = document.getElementById('input').value.trim();
      const lines = input.split('\n');
      const cards = [];

      for (const line of lines) {
        const parts = line.split('|');
        if (parts.length >= 2) {
          const front = parts[0].trim();
          const back = parts.slice(1).join('|').trim();
          if (front && back) {
            cards.push({ id: crypto.randomUUID(), front, back });
          }
        }
      }

      if (cards.length === 0) {
        alert('Add at least one flashcard in the format: Question | Answer');
        return;
      }

      const stack = {
        id: crypto.randomUUID(),
        title,
        cards,
        color: { red: selectedColor.r, green: selectedColor.g, blue: selectedColor.b }
      };

      const json = JSON.stringify(stack);
      const encoded = btoa(unescape(encodeURIComponent(json)));
      generatedLink = `https://stackedflashcards.com/import?stack=${encoded}`;

      // Show output
      document.getElementById('linkDisplay').textContent = generatedLink;
      document.getElementById('openLink').href = generatedLink;
      document.getElementById('copyBtn').textContent = 'Copy Link';
      document.getElementById('copyBtn').classList.remove('copied');
      document.getElementById('output').style.display = 'block';

      // Generate QR
      const qrcodeEl = document.getElementById('qrcode');
      qrcodeEl.innerHTML = '';
      QRCode.toCanvas(generatedLink, { width: 220, margin: 2, color: { dark: '#000', light: '#fff' } }, (err, canvas) => {
        if (!err) qrcodeEl.appendChild(canvas);
      });

      document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function copyLink() {
      if (!generatedLink) return;
      navigator.clipboard.writeText(generatedLink).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy Link';
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
